<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction Result</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#74ebd5,#ACB6E5);

}

.container{

width:500px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0px 0px 20px rgba(0,0,0,0.2);
text-align:center;

}

h1{

color:#d63031;
margin-bottom:20px;

}

.result{

font-size:28px;
font-weight:bold;
margin-top:20px;
color:#2d3436;

}

.probability{

margin-top:15px;
font-size:22px;
color:#0984e3;

}

button{

margin-top:30px;
padding:12px 30px;
background:#0984e3;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#0652DD;

}

</style>

</head>

<body>

<div class="container">

<h1>Prediction Result</h1>

<div class="result">

{{ prediction }}

</div>

<div class="probability">

Probability : {{ probability }} %

</div>

<form action="/">

<button type="submit">

Predict Again

</button>

</form>

</div>

</body>

</html>
