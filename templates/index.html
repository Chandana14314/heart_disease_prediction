<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Disease Prediction</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#050816;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:auto;

}

/* Animated Background */

body::before{

content:'';
position:fixed;
width:200%;
height:200%;
background:
linear-gradient(90deg,transparent,#00ffff55,transparent),
linear-gradient(180deg,transparent,#ff00ff33,transparent);
animation:bgMove 12s linear infinite;
z-index:-2;

}

@keyframes bgMove{

0%{transform:translate(-20%,-20%) rotate(0deg);}
100%{transform:translate(-20%,-20%) rotate(360deg);}

}

/* Card */

.container{

position:relative;
width:950px;
padding:35px;
border-radius:20px;
background:#0d1117;
overflow:hidden;

}

.container::before{

content:'';
position:absolute;
inset:-3px;
background:linear-gradient(
90deg,
#00ffff,
#00ff66,
#ff00ff,
#00ffff
);

background-size:400%;
animation:borderAnimation 5s linear infinite;
z-index:-1;

}

.container::after{

content:'';
position:absolute;
inset:3px;
background:#0d1117;
border-radius:18px;
z-index:-1;

}

@keyframes borderAnimation{

0%{background-position:0%;}
100%{background-position:400%;}

}

h1{

text-align:center;
color:#00ffff;
margin-bottom:10px;
text-shadow:0 0 10px cyan;

}

.subtitle{

text-align:center;
color:white;
margin-bottom:25px;

}

form{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;

}

.input-box{

display:flex;
flex-direction:column;

}

label{

color:#00ffff;
margin-bottom:6px;
font-weight:bold;

}

input,
select{

padding:12px;
background:#111827;
border:2px solid #00ffff;
border-radius:8px;
color:white;
font-size:15px;
outline:none;
transition:.3s;

}

input:focus,
select:focus{

box-shadow:0 0 20px cyan;
transform:scale(1.03);

}

.button{

grid-column:span 2;
text-align:center;
margin-top:15px;

}

button{

padding:15px 50px;
font-size:18px;
border:none;
border-radius:40px;
cursor:pointer;
background:#00ffff;
color:#000;
font-weight:bold;
transition:.4s;

}

button:hover{

box-shadow:0 0 15px cyan,
0 0 30px cyan,
0 0 60px cyan;

transform:translateY(-3px);

}

.footer{

margin-top:25px;
text-align:center;
color:#aaa;

}

@media(max-width:900px){

.container{

width:95%;

}

form{

grid-template-columns:1fr;

}

.button{

grid-column:span 1;

}

}

</style>

</head>

<body>

<div class="container">

<h1>❤️ Heart Disease Prediction</h1>

<div class="subtitle">
Machine Learning Based Prediction System
</div>

<form action="/predict" method="POST">

<div class="input-box">
<label>Age</label>
<input type="number" name="age" required>
</div>

<div class="input-box">
<label>Gender</label>
<select name="sex">
<option value="1">Male</option>
<option value="0">Female</option>
</select>
</div>

<div class="input-box">
<label>Chest Pain Type</label>
<select name="cp">
<option value="0">Typical Angina</option>
<option value="1">Atypical Angina</option>
<option value="2">Non-Anginal Pain</option>
<option value="3">Asymptomatic</option>
</select>
</div>

<div class="input-box">
<label>Resting Blood Pressure</label>
<input type="number" name="trestbps" required>
</div>

<div class="input-box">
<label>Cholesterol</label>
<input type="number" name="chol" required>
</div>

<div class="input-box">
<label>Fasting Blood Sugar</label>
<select name="fbs">
<option value="1">Greater than 120</option>
<option value="0">Less than 120</option>
</select>
</div>

<div class="input-box">
<label>Rest ECG</label>
<select name="restecg">
<option value="0">Normal</option>
<option value="1">ST-T Wave Abnormality</option>
<option value="2">Left Ventricular Hypertrophy</option>
</select>
</div>

<div class="input-box">
<label>Maximum Heart Rate</label>
<input type="number" name="thalach" required>
</div>

<div class="input-box">
<label>Exercise Induced Angina</label>
<select name="exang">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="input-box">
<label>Old Peak</label>
<input type="number" step="0.1" name="oldpeak" required>
</div>

<div class="input-box">
<label>Slope</label>
<select name="slope">
<option value="0">Upsloping</option>
<option value="1">Flat</option>
<option value="2">Downsloping</option>
</select>
</div>

<div class="input-box">
<label>Number of Major Vessels (CA)</label>
<select name="ca">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>
</div>

<div class="input-box">
<label>Thal</label>
<select name="thal">
<option value="0">Normal</option>
<option value="1">Fixed Defect</option>
<option value="2">Reversible Defect</option>
<option value="3">Unknown</option>
</select>
</div>

<div class="button">
<button type="submit">
Predict Heart Disease
</button>
</div>

</form>

<div class="footer">
Heart Disease Prediction System • Flask • Machine Learning
</div>

</div>

</body>
</html>
